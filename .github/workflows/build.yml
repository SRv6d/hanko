---
name: Build

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Build release artifacts
        run: nix build .#release-artifacts --out-link release-artifacts --no-update-lock-file

      - name: Verify reproducibility of release artifacts
        run: nix build .#release-artifacts --rebuild --no-update-lock-file

      - name: Upload release artifacts
        run: gh release upload --clobber "${GITHUB_REF_NAME}" release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Container Registry login
        if: runner.os == 'Linux'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Extract image metadata
        if: runner.os == 'Linux'
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build container images
        if: runner.os == 'Linux'
        run: nix build .#release-containers --out-link release-containers --no-update-lock-file

      - name: Push container images
        if: runner.os == 'Linux'
        id: containers
        run: |
          mapfile -t meta_tags < <(printf '%s\n' "$META_TAGS")
          version_tag="${meta_tags[0]}"
          arch_tags=()
          for img in release-containers/*.tar.gz; do
            arch=$(basename "$img" .tar.gz)
            docker load < "$img"
            tag="${version_tag}-${arch}"
            docker tag "hanko:${version_tag##*:v}" "$tag"
            docker push "$tag"
            arch_tags+=("$tag")
          done
          tag_args=()
          for t in "${meta_tags[@]}"; do
            [[ -n "$t" ]] && tag_args+=(--tag "$t")
          done
          docker buildx imagetools create "${tag_args[@]}" "${arch_tags[@]}"
          digest=$(docker buildx imagetools inspect \
            --format '{{json .Manifest}}' \
            "${version_tag}" | jq -r '.digest')
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "subject_name=${version_tag%%:*}" >> "$GITHUB_OUTPUT"
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}

      - name: Attest container image
        if: runner.os == 'Linux'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-name: ${{ steps.containers.outputs.subject_name }}
          subject-digest: ${{ steps.containers.outputs.digest }}
          push-to-registry: true

  attest-build-provenance:
    permissions:
      id-token: write
      attestations: write
      contents: write
    needs: build
    runs-on: ubuntu-latest
    env:
      DOWNLOAD_DIR: release-files
      PROVENANCE_PATH: release-files/hanko-${{ github.ref_name }}.sigstore.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Download release files
        run: >-
          gh release download "${GITHUB_REF_NAME}" --dir ${DOWNLOAD_DIR}
          --pattern "hanko-*"
          --pattern "SHA256SUMS"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Attest release files
        id: provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: ${{ env.DOWNLOAD_DIR }}/*

      - name: Prepare provenance bundle
        run: cp "${BUNDLE_PATH}" "${PROVENANCE_PATH}"
        env:
          BUNDLE_PATH: ${{ steps.provenance.outputs.bundle-path }}

      - name: Upload provenance
        run: gh release upload --clobber "${GITHUB_REF_NAME}" "${PROVENANCE_PATH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
